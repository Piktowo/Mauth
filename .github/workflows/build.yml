name: Build APK

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - '*'
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: 'gradle'

      - name: chmod gradlew
        run: chmod +x gradlew

      - name: 生成临时签名密钥
        run: |
          keytool -genkeypair -v \
            -keystore ${{ github.workspace }}/keystore.jks \
            -alias mauth \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -storepass android \
            -keypass android \
            -dname "CN=CI Build, OU=CI, O=Mauth, L=Unknown, S=Unknown, C=US"

      - name: 构建并签名 Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: mauth
          KEY_PASSWORD: android

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: mauth
          path: app/build/outputs/apk/release/app-release.apk